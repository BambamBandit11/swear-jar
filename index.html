<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Swear Jar</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f8f7f4;
    --card: #ffffff;
    --border: #e8e6e1;
    --text: #1a1a1a;
    --muted: #8a8a8a;
    --accent: #e85d3a;
    --accent-hover: #d14e2d;
    --green: #2d8a4e;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-lg: 0 4px 12px rgba(0,0,0,0.08);
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem;
  }

  h1 {
    font-size: 1.5rem;
    font-weight: 600;
    letter-spacing: -0.02em;
    margin-bottom: 0.25rem;
  }

  .subtitle {
    color: var(--muted);
    font-size: 0.875rem;
    margin-bottom: 2rem;
  }

  .jar {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2rem;
    width: 100%;
    max-width: 400px;
    box-shadow: var(--shadow);
    text-align: center;
    margin-bottom: 1.5rem;
    position: relative;
    overflow: hidden;
  }

  .jar-icon {
    font-size: 3rem;
    margin-bottom: 0.75rem;
    display: block;
  }

  .jar-total {
    font-size: 2.5rem;
    font-weight: 700;
    letter-spacing: -0.03em;
    margin-bottom: 0.25rem;
  }

  .jar-label {
    color: var(--muted);
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .people {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    width: 100%;
    max-width: 400px;
    margin-bottom: 1.5rem;
  }

  .person {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem 1rem;
    box-shadow: var(--shadow);
    text-align: center;
  }

  .person-name {
    font-weight: 600;
    font-size: 0.95rem;
    margin-bottom: 0.5rem;
    cursor: pointer;
    border: none;
    background: none;
    color: var(--text);
    width: 100%;
    text-align: center;
    outline: none;
    border-bottom: 1px dashed transparent;
  }

  .person-name:hover { border-bottom-color: var(--muted); }
  .person-name:focus { border-bottom-color: var(--accent); }

  .person-total {
    font-size: 1.5rem;
    font-weight: 700;
    margin-bottom: 0.75rem;
    letter-spacing: -0.02em;
  }

  .person button {
    width: 100%;
    padding: 0.6rem;
    border: none;
    border-radius: 8px;
    background: var(--accent);
    color: white;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }

  .person button:hover { background: var(--accent-hover); }
  .person button:active { transform: scale(0.97); }

  .amounts {
    display: flex;
    gap: 0.5rem;
    width: 100%;
    max-width: 400px;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
    justify-content: center;
  }

  .amounts button {
    padding: 0.5rem 1rem;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--card);
    color: var(--text);
    font-size: 0.85rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
  }

  .amounts button:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .amounts button.active {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }

  .custom-amount {
    width: 100%;
    max-width: 400px;
    margin-bottom: 1.5rem;
  }

  .custom-amount input {
    width: 100%;
    padding: 0.6rem 1rem;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 0.9rem;
    text-align: center;
    outline: none;
    transition: border-color 0.15s;
    background: var(--card);
  }

  .custom-amount input:focus { border-color: var(--accent); }

  .history {
    width: 100%;
    max-width: 400px;
    margin-top: 0.5rem;
  }

  .history-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.75rem;
  }

  .history-header h2 {
    font-size: 0.9rem;
    font-weight: 600;
  }

  .history-header button {
    font-size: 0.75rem;
    color: var(--muted);
    background: none;
    border: none;
    cursor: pointer;
    text-decoration: underline;
  }

  .history-header button:hover { color: var(--accent); }

  .entry {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.65rem 0.85rem;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 0.5rem;
    box-shadow: var(--shadow);
    font-size: 0.85rem;
    animation: slideIn 0.2s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .entry-left {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .entry-name { font-weight: 600; }
  .entry-time { color: var(--muted); font-size: 0.75rem; }
  .entry-amount { font-weight: 600; color: var(--accent); }

  .entry-undo {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 0.75rem;
    margin-left: 0.75rem;
    opacity: 0.6;
    transition: opacity 0.15s;
  }

  .entry-undo:hover { opacity: 1; color: var(--accent); }

  .empty {
    text-align: center;
    color: var(--muted);
    font-size: 0.85rem;
    padding: 1.5rem;
  }

  .coin-pop {
    position: fixed;
    pointer-events: none;
    font-size: 1.5rem;
    animation: popUp 0.7s ease forwards;
    z-index: 10;
  }

  @keyframes popUp {
    0% { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-80px) scale(1.3); }
  }

  .settings-row {
    width: 100%;
    max-width: 400px;
    margin-bottom: 1.5rem;
    display: flex;
    justify-content: center;
    gap: 0.75rem;
  }

  .settings-row select {
    padding: 0.4rem 0.75rem;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--card);
    font-size: 0.8rem;
    color: var(--text);
    cursor: pointer;
    outline: none;
  }

  .settings-row select:focus { border-color: var(--accent); }
</style>
</head>
<body>

<h1>Swear Jar</h1>
<p class="subtitle">Keep it clean or pay up.</p>

<div class="jar">
  <span class="jar-icon">🫙</span>
  <div class="jar-total" id="total">$0.00</div>
  <div class="jar-label">Total collected</div>
</div>

<div class="settings-row">
  <select id="currency" aria-label="Currency">
    <option value="$">$ USD</option>
    <option value="€">€ EUR</option>
    <option value="£">£ GBP</option>
    <option value="¥">¥ JPY</option>
    <option value="A$">A$ AUD</option>
    <option value="C$">C$ CAD</option>
  </select>
</div>

<div class="amounts" id="amounts">
  <button data-val="0.25">0.25</button>
  <button data-val="0.50">0.50</button>
  <button data-val="1" class="active">1.00</button>
  <button data-val="2">2.00</button>
  <button data-val="5">5.00</button>
</div>

<div class="custom-amount">
  <input type="number" id="customAmount" placeholder="Or enter a custom amount" min="0.01" step="0.01">
</div>

<div class="people">
  <div class="person">
    <input class="person-name" id="name1" value="Partner 1" maxlength="16" aria-label="Partner 1 name">
    <div class="person-total" id="total1">$0.00</div>
    <button onclick="addSwear(0)">+ Swore!</button>
  </div>
  <div class="person">
    <input class="person-name" id="name2" value="Partner 2" maxlength="16" aria-label="Partner 2 name">
    <div class="person-total" id="total2">$0.00</div>
    <button onclick="addSwear(1)">+ Swore!</button>
  </div>
</div>

<div class="history">
  <div class="history-header">
    <h2>History</h2>
    <button onclick="clearHistory()">Clear all</button>
  </div>
  <div id="entries"></div>
</div>

<script>
  const STORAGE_KEY = 'swear-jar-data';

  const defaults = () => ({
    names: ['Partner 1', 'Partner 2'],
    entries: [],
    currency: '$',
    amount: 1
  });

  let state = load();

  function load() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return defaults();
      const parsed = JSON.parse(raw);
      return { ...defaults(), ...parsed };
    } catch { return defaults(); }
  }

  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  function getAmount() {
    const custom = parseFloat(document.getElementById('customAmount').value);
    if (!isNaN(custom) && custom > 0) return custom;
    return state.amount;
  }

  function fmt(n) {
    return state.currency + n.toFixed(2);
  }

  function addSwear(personIdx) {
    const amount = getAmount();
    state.entries.unshift({
      person: personIdx,
      amount,
      time: Date.now()
    });
    save();
    render();
    popCoin();
    document.getElementById('customAmount').value = '';
  }

  function removeEntry(idx) {
    state.entries.splice(idx, 1);
    save();
    render();
  }

  function clearHistory() {
    if (!confirm('Clear all history? This cannot be undone.')) return;
    state.entries = [];
    save();
    render();
  }

  function timeAgo(ts) {
    const diff = Date.now() - ts;
    const mins = Math.floor(diff / 60000);
    if (mins < 1) return 'just now';
    if (mins < 60) return mins + 'm ago';
    const hrs = Math.floor(mins / 60);
    if (hrs < 24) return hrs + 'h ago';
    const days = Math.floor(hrs / 24);
    return days + 'd ago';
  }

  function render() {
    const totals = [0, 0];
    state.entries.forEach(e => { totals[e.person] += e.amount; });
    const grand = totals[0] + totals[1];

    document.getElementById('total').textContent = fmt(grand);
    document.getElementById('total1').textContent = fmt(totals[0]);
    document.getElementById('total2').textContent = fmt(totals[1]);

    document.getElementById('name1').value = state.names[0];
    document.getElementById('name2').value = state.names[1];

    document.getElementById('currency').value = state.currency;

    const container = document.getElementById('entries');
    if (state.entries.length === 0) {
      container.innerHTML = '<div class="empty">No swears yet. Keep it up!</div>';
      return;
    }

    container.innerHTML = state.entries.slice(0, 50).map((e, i) => `
      <div class="entry">
        <div class="entry-left">
          <span class="entry-name">${esc(state.names[e.person])}</span>
          <span class="entry-time">${timeAgo(e.time)}</span>
        </div>
        <div>
          <span class="entry-amount">${fmt(e.amount)}</span>
          <button class="entry-undo" onclick="removeEntry(${i})" title="Undo">✕</button>
        </div>
      </div>
    `).join('');
  }

  function esc(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function popCoin() {
    const el = document.createElement('div');
    el.className = 'coin-pop';
    el.textContent = '🪙';
    el.style.left = (Math.random() * 60 + 20) + '%';
    el.style.top = '40%';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 700);
  }

  // Amount buttons
  document.querySelectorAll('#amounts button').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#amounts button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.amount = parseFloat(btn.dataset.val);
      document.getElementById('customAmount').value = '';
      save();
      render();
    });
  });

  // Name editing
  document.getElementById('name1').addEventListener('input', e => {
    state.names[0] = e.target.value || 'Partner 1';
    save();
    render();
  });
  document.getElementById('name2').addEventListener('input', e => {
    state.names[1] = e.target.value || 'Partner 2';
    save();
    render();
  });

  // Currency
  document.getElementById('currency').addEventListener('change', e => {
    state.currency = e.target.value;
    save();
    render();
  });

  // Custom amount clears preset selection
  document.getElementById('customAmount').addEventListener('input', () => {
    document.querySelectorAll('#amounts button').forEach(b => b.classList.remove('active'));
  });

  render();
</script>

</body>
</html>
